<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>京都ディバンカー</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #08080b;
      color: #fff8ef;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(116, 0, 0, 0.2), transparent 34rem),
        linear-gradient(180deg, #17131a, #070708);
    }

    main {
      width: min(100vw, 560px);
      padding: 8px;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 572 / 1024;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: #111;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.58);
      transition: filter 240ms ease;
    }

    .stage.distorted {
      filter: contrast(1.12) saturate(0.78) hue-rotate(-8deg);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
      touch-action: manipulation;
    }

    .hud {
      position: absolute;
      left: 12px;
      top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(5, 5, 8, 0.68);
      color: rgba(255, 255, 255, 0.88);
      font-size: 14px;
      line-height: 1;
      max-width: calc(100% - 120px);
      pointer-events: none;
    }

    .time {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      min-height: 36px;
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 6px;
      background: rgba(5, 5, 8, 0.72);
      color: #ffdf9b;
      font-size: 14px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
    }

    .time.danger {
      color: #ff0000;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.95),
        0 0 18px rgba(120, 0, 0, 0.95);
      animation: dangerBlink 420ms steps(2, end) infinite;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 48%, rgba(118, 0, 0, 0.24), rgba(2, 0, 0, 0.86) 64%),
        rgba(0, 0, 0, 0.72);
      transition: opacity 300ms ease, visibility 300ms ease;
    }

    .start-screen {
      z-index: 4;
      cursor: pointer;
    }

    .start-screen.hide,
    .message {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .message {
      z-index: 3;
    }

    .message.show {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .complete-flash {
      z-index: 2;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.36);
    }

    .complete-flash.show {
      opacity: 1;
      visibility: visible;
    }

    .title-image,
    .complete-image {
      display: block;
      width: min(92vw, 620px);
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 0 18px rgba(130, 0, 0, 0.82));
    }

    .complete-image {
      width: min(94vw, 760px);
    }

    .panel {
      width: min(94%, 620px);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(10, 10, 14, 0.9);
      text-align: center;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.62);
    }

    .start-panel {
      background: transparent;
      border: 0;
      box-shadow: none;
    }

    .logo-image {
      display: block;
      width: min(94%, 600px);
      height: auto;
      margin: 0 auto;
      filter: drop-shadow(0 0 22px rgba(170, 0, 0, 0.72));
    }

    .final-copy {
      display: none;
      margin: 8px 0 18px;
      color: #ff1a1a;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(16px, 4.5vw, 28px);
      font-weight: 800;
      line-height: 1.35;
      text-shadow:
        0 0 8px rgba(255, 0, 0, 0.85),
        0 0 18px rgba(70, 0, 0, 0.95);
    }

    .final-copy.show {
      display: block;
    }

    .hint,
    .message p {
      margin: 0 0 16px;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.7;
    }

    .click-icon {
      width: 64px;
      height: 64px;
      margin: 18px auto 0;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 50%;
      position: relative;
      opacity: 0.86;
      animation: clickPulse 1100ms ease-in-out infinite alternate;
    }

    .click-icon::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 13px;
      width: 15px;
      height: 26px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 9px;
    }

    .click-icon::after {
      content: "";
      position: absolute;
      left: 31px;
      top: 20px;
      width: 2px;
      height: 7px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 2px;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      width: 62px;
      max-width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    button.secondary {
      background: transparent;
    }

    .link-button {
      display: block;
      width: 180px;
      max-width: 100%;
    }

    .actions button {
      flex: 0 0 auto;
    }

    .button-image {
      display: block;
      width: 100%;
      height: auto;
    }

    @media (max-width: 640px) {
      main {
        padding: 6px;
      }

      .hud {
        left: 8px;
        top: 8px;
        max-width: calc(100% - 108px);
        gap: 4px;
        padding: 6px 7px;
        font-size: 11px;
      }

      .time {
        right: 8px;
        bottom: 8px;
        min-width: 76px;
        min-height: 30px;
        padding: 6px 7px;
        font-size: 11px;
      }

      .overlay {
        padding: 10px;
      }

      .panel {
        width: min(96%, 420px);
        padding: 14px;
      }

      .title-image {
        width: min(94vw, 420px);
      }

      .complete-image {
        width: min(94vw, 430px);
      }

      .logo-image {
        width: min(92%, 360px);
      }

      .message p {
        font-size: 13px;
        line-height: 1.55;
      }

      .actions {
        gap: 8px;
      }

      button,
      .actions button {
        width: 54px;
      }

      .link-button {
        width: min(100%, 168px);
      }

      .click-icon {
        width: 48px;
        height: 48px;
      }

      .click-icon::before {
        left: 18px;
        top: 10px;
        width: 12px;
        height: 21px;
      }

      .click-icon::after {
        left: 24px;
        top: 16px;
      }
    }

    @keyframes titlePulse {
      from {
        filter: blur(0);
        transform: rotate(-1deg) scale(1);
      }
      to {
        filter: blur(0.75px);
        transform: rotate(0.7deg) scale(1.02);
      }
    }

    @keyframes clickPulse {
      from {
        transform: scale(1);
        opacity: 0.55;
      }
      to {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    @keyframes dangerBlink {
      50% {
        opacity: 0.35;
      }
    }
  </style>
</head>
<body>
  <main>
    <section id="stage" class="stage" aria-label="違和感を探すミニゲーム">
      <canvas id="scene" width="572" height="1024"></canvas>
      <div class="hud">
        <span id="stageLabel">Stage 1 / 10</span>
        <span id="spotLabel">違和感 0 / 3</span>
      </div>
      <div id="timeLabel" class="time">残り 0:20</div>

      <div id="startScreen" class="overlay start-screen">
        <div class="panel start-panel">
          <img class="title-image" src="assets/title-nanika.svg" alt="何かが違う・・" />
          <div class="click-icon" aria-label="クリックして開始"></div>
        </div>
      </div>

      <div id="completeFlash" class="overlay complete-flash">
        <img class="complete-image" src="assets/complete-message.svg" alt="お分かりいただけただろうか…" />
      </div>

      <div id="message" class="overlay message" aria-live="polite">
        <div class="panel">
          <img class="logo-image" src="assets/kyoto-divanker-logo.svg" alt="京都ディバンカー" />
          <p id="finalCopy" class="final-copy">すべてのクソ広告よ滅べ・・・</p>
          <div class="actions">
            <button id="nextButton" type="button" aria-label="次のステージ"><img class="button-image" src="assets/button-next.svg" alt="" /></button>
            <button id="restartButton" class="secondary" type="button" aria-label="最初に戻る"><img class="button-image" src="assets/button-restart.svg" alt="" /></button>
            <a id="twitterLink" class="link-button" href="https://twitter.com/maruco" target="_blank" rel="noopener" aria-label="Twitter @maruco"><img class="button-image" src="assets/button-twitter.svg" alt="" /></a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const stage = document.getElementById("stage");
    const stageLabel = document.getElementById("stageLabel");
    const spotLabel = document.getElementById("spotLabel");
    const timeLabel = document.getElementById("timeLabel");
    const startScreen = document.getElementById("startScreen");
    const completeFlash = document.getElementById("completeFlash");
    const message = document.getElementById("message");
    const nextButton = document.getElementById("nextButton");
    const restartButton = document.getElementById("restartButton");
    const twitterLink = document.getElementById("twitterLink");
    const finalCopy = document.getElementById("finalCopy");

    const TIME_LIMIT = 20;
    const stages = [
      {
        title: "夜の寝室",
        image: "assets/stage01-anomaly.png",
        spots: [
          { type: "tabletHorror", x: 70, y: 505, w: 220, h: 190, found: false },
          { type: "windowMan", x: 0, y: 65, w: 170, h: 220, found: false },
          { type: "pillowWoman", x: 420, y: 335, w: 152, h: 150, found: false }
        ]
      },
      {
        title: "屋内プール",
        image: "assets/stage02-anomaly.png",
        spots: [
          { type: "angryWoman", x: 315, y: 245, w: 150, h: 150, found: false },
          { type: "underwaterHand", x: 150, y: 705, w: 185, h: 235, found: false },
          { type: "bloodWall", x: 0, y: 220, w: 130, h: 180, found: false }
        ]
      },
      {
        title: "川辺の仕事部屋",
        image: "assets/stage03-office-anomaly.png",
        spots: [
          { type: "waterFace", x: 410, y: 80, w: 150, h: 158, found: false },
          { type: "floorHand", x: 12, y: 750, w: 180, h: 150, found: false },
          { type: "cupYokai", x: 0, y: 380, w: 135, h: 135, found: false }
        ]
      },
      {
        title: "夕食の部屋",
        image: "assets/stage04-anomaly.png",
        spots: [
          { type: "windowMan", x: 0, y: 135, w: 145, h: 220, found: false },
          { type: "skeletonFood", x: 85, y: 650, w: 205, h: 135, found: false },
          { type: "photoGhost", x: 0, y: 405, w: 135, h: 130, found: false }
        ]
      },
      {
        title: "川遊び",
        image: "assets/stage05-anomaly.png",
        spots: [
          { type: "childMan", x: 0, y: 410, w: 150, h: 190, found: false },
          { type: "waterFace", x: 150, y: 565, w: 210, h: 170, found: false },
          { type: "whiteYokai", x: 255, y: 75, w: 135, h: 205, found: false }
        ]
      },
      {
        title: "寝室",
        image: "assets/stage06-anomaly.png",
        spots: [
          { type: "windowFace", x: 0, y: 165, w: 115, h: 170, found: false },
          { type: "blackPhoto", x: 350, y: 185, w: 130, h: 110, found: false },
          { type: "strawDoll", x: 475, y: 95, w: 95, h: 170, found: false }
        ]
      },
      {
        title: "カラオケ",
        image: "assets/stage07-anomaly.png",
        spots: [
          { type: "screenHandprint", x: 285, y: 165, w: 245, h: 160, found: false },
          { type: "tableFace", x: 380, y: 610, w: 160, h: 145, found: false },
          { type: "patlight", x: 0, y: 45, w: 95, h: 150, found: false }
        ]
      },
      {
        title: "電車",
        image: "assets/stage08-anomaly.png",
        spots: [
          { type: "windowFace", x: 360, y: 245, w: 170, h: 180, found: false },
          { type: "seatMan", x: 0, y: 245, w: 145, h: 165, found: false },
          { type: "bagHand", x: 350, y: 450, w: 165, h: 165, found: false }
        ]
      },
      {
        title: "神社",
        image: "assets/stage09-anomaly.png",
        spots: [
          { type: "redKomainu", x: 0, y: 405, w: 160, h: 220, found: false },
          { type: "treeFace", x: 495, y: 165, w: 77, h: 180, found: false },
          { type: "fallenPerson", x: 360, y: 405, w: 165, h: 125, found: false }
        ]
      },
      {
        title: "夜道",
        image: "assets/stage10-anomaly.png",
        spots: [
          { type: "vendingMan", x: 0, y: 390, w: 130, h: 180, found: false },
          { type: "ufo", x: 235, y: 85, w: 160, h: 100, found: false },
          { type: "streetHand", x: 20, y: 805, w: 165, h: 190, found: false }
        ]
      }
    ];

    const images = stages.map((gameStage) => {
      const image = new Image();
      image.src = gameStage.image;
      return image;
    });

    let currentStageIndex = 0;
    let started = false;
    let distortion = 0;
    let remaining = TIME_LIMIT;
    let timerId = null;
    let resultDelayId = null;

    function currentStage() {
      return stages[currentStageIndex];
    }

    function currentImage() {
      return images[currentStageIndex];
    }

    function formatTime(seconds) {
      return `残り ${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, "0")}`;
    }

    function updateHud() {
      const found = currentStage().spots.filter((spot) => spot.found).length;
      stageLabel.textContent = `Stage ${currentStageIndex + 1} / ${stages.length}`;
      spotLabel.textContent = `違和感 ${found} / ${currentStage().spots.length}`;
      timeLabel.textContent = formatTime(remaining);
      timeLabel.classList.toggle("danger", remaining < 5);
    }

    function drawImageCover(image) {
      const imageRatio = image.width / image.height;
      const canvasRatio = canvas.width / canvas.height;
      let sx = 0;
      let sy = 0;
      let sw = image.width;
      let sh = image.height;

      if (imageRatio > canvasRatio) {
        sw = image.height * canvasRatio;
        sx = (image.width - sw) / 2;
      } else {
        sh = image.width / canvasRatio;
        sy = (image.height - sh) / 2;
      }

      ctx.drawImage(image, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    }

    function line(x1, y1, x2, y2, width, color) {
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    function drawPaintX(spot) {
      const cx = spot.x + spot.w / 2;
      const cy = spot.y + spot.h / 2;
      const size = Math.max(52, Math.min(spot.w, spot.h) * 0.54);
      ctx.save();
      ctx.lineCap = "round";
      ctx.shadowColor = "rgba(45, 0, 0, 0.86)";
      ctx.shadowBlur = 9;
      line(cx - size, cy - size * 0.78, cx + size, cy + size * 0.78, 17, "rgba(165, 0, 0, 0.96)");
      line(cx + size * 0.95, cy - size, cx - size * 0.95, cy + size, 17, "rgba(165, 0, 0, 0.96)");
      ctx.shadowBlur = 0;
      line(cx - size * 0.84, cy - size * 0.65, cx + size * 0.8, cy + size * 0.65, 6, "rgba(255, 42, 24, 0.86)");
      line(cx + size * 0.8, cy - size * 0.82, cx - size * 0.8, cy + size * 0.82, 6, "rgba(255, 42, 24, 0.86)");
      ctx.restore();
    }

    function drawVignette() {
      const darkness = 0.15 + distortion * 0.055 + (TIME_LIMIT - remaining) * 0.002;
      const centerX = canvas.width / 2;
      const centerY = canvas.height * 0.47;
      const gradient = ctx.createRadialGradient(centerX, centerY, 170, centerX, centerY, 610);
      gradient.addColorStop(0, "rgba(0, 0, 0, 0)");
      gradient.addColorStop(1, `rgba(0, 0, 0, ${Math.min(0.48, darkness)})`);
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawNoise() {
      if (distortion === 0) return;
      ctx.save();
      ctx.globalAlpha = Math.min(0.12, distortion * 0.035);
      ctx.globalCompositeOperation = "screen";
      for (let i = 0; i < 420; i += 1) {
        const value = Math.floor(125 + Math.random() * 120);
        ctx.fillStyle = `rgb(${value}, ${value}, ${value})`;
        ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 1 + Math.random() * 2, 1);
      }
      ctx.restore();
    }

    function draw() {
      const image = currentImage();
      if (!image.complete) return;
      drawImageCover(image);
      currentStage().spots.forEach((spot) => {
        if (spot.found) drawPaintX(spot);
      });
      drawVignette();
      drawNoise();
      updateHud();
    }

    function getCanvasPoint(event) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (event.clientX - rect.left) * (canvas.width / rect.width),
        y: (event.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function stopResultDelay() {
      if (resultDelayId) {
        clearTimeout(resultDelayId);
        resultDelayId = null;
      }
      completeFlash.classList.remove("show");
    }

    function startTimer() {
      stopTimer();
      timerId = setInterval(() => {
        remaining -= 1;
        if (remaining <= 0) {
          remaining = 0;
          updateHud();
          showResult(false);
          return;
        }
        draw();
      }, 1000);
    }

    function showResult(cleared) {
      stopTimer();
      const isLast = currentStageIndex === stages.length - 1;
      nextButton.style.display = cleared && !isLast ? "" : "none";
      twitterLink.style.display = cleared && isLast ? "" : "none";
      finalCopy.classList.toggle("show", cleared && isLast);
      message.classList.add("show");
    }

    function showCompleteThenResult() {
      stopTimer();
      completeFlash.classList.add("show");
      resultDelayId = setTimeout(() => {
        resultDelayId = null;
        completeFlash.classList.remove("show");
        showResult(true);
      }, 3000);
    }

    function startGame() {
      started = true;
      startScreen.classList.add("hide");
      remaining = TIME_LIMIT;
      distortion = 0;
      draw();
      startTimer();
    }

    function handleTap(event) {
      if (!started) {
        startGame();
        return;
      }
      if (message.classList.contains("show") || completeFlash.classList.contains("show")) return;

      const point = getCanvasPoint(event);
      const spot = currentStage().spots.find((item) => (
        !item.found &&
        point.x >= item.x &&
        point.x <= item.x + item.w &&
        point.y >= item.y &&
        point.y <= item.y + item.h
      ));

      if (!spot) return;

      spot.found = true;
      distortion += 1;
      stage.classList.add("distorted");
      window.setTimeout(() => stage.classList.remove("distorted"), 220);
      draw();

      if (currentStage().spots.every((item) => item.found)) {
        showCompleteThenResult();
      }
    }

    function resetFound(stageData) {
      stageData.spots.forEach((spot) => {
        spot.found = false;
      });
    }

    function goNext() {
      stopResultDelay();
      stopTimer();
      currentStageIndex += 1;
      resetFound(currentStage());
      remaining = TIME_LIMIT;
      distortion = 0;
      started = false;
      message.classList.remove("show");
      finalCopy.classList.remove("show");
      startScreen.classList.remove("hide");
      draw();
    }

    function restart() {
      stopTimer();
      stopResultDelay();
      started = false;
      currentStageIndex = 0;
      remaining = TIME_LIMIT;
      distortion = 0;
      stages.forEach(resetFound);
      message.classList.remove("show");
      finalCopy.classList.remove("show");
      startScreen.classList.remove("hide");
      draw();
    }

    canvas.addEventListener("pointerdown", handleTap);
    startScreen.addEventListener("pointerdown", handleTap);
    nextButton.addEventListener("click", goNext);
    restartButton.addEventListener("click", restart);

    Promise.all(images.map((image) => image.decode())).then(draw).catch(() => {
      ctx.fillStyle = "#101115";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f5f2ea";
      ctx.font = "26px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("画像の読み込みに失敗しました", canvas.width / 2, canvas.height / 2);
    });
  </script>
</body>
</html>
