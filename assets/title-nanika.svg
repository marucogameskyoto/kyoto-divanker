<svg xmlns="http://www.w3.org/2000/svg" width="900" height="180" viewBox="0 0 900 180" role="img" aria-label="何かが違う・・">
  <defs>
    <filter id="glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#9b0000" flood-opacity="0.95"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="900" height="180" fill="none"/>
  <text x="450" y="112"
        text-anchor="middle"
        filter="url(#glow)"
        font-family="'Yu Mincho','Hiragino Mincho ProN','MS Mincho',serif"
        font-size="82"
        font-weight="900"
        fill="#e00000"
        stroke="#180000"
        stroke-width="3"
        paint-order="stroke fill"
        transform="skewX(-6) rotate(-1 450 90)">何かが違う・・</text>
</svg>
